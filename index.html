<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kasir Pro - Mode Kasir</title>
  <meta name="theme-color" content="#2563eb" />
  
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --biru: #2563eb;
      --biru-gelap: #1e40af;
      --hijau: #16a34a;
      --merah: #dc2626;
      --oren: #ea580c;
      --abu: #f1f5f9;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
    }
    body {
      background: var(--abu);
      padding: 10px;
      padding-bottom: 80px;
    }
    .app {
      max-width: 1200px;
      margin: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--biru), var(--biru-gelap));
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
    }
    .konten {
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 850px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      background: #f8fafc;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }
    .card h3 {
      margin-bottom: 12px;
      font-size: 16px;
      color: #1e293b;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
    }
    input:focus, select:focus {
      border-color: var(--biru);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-kamera { background: var(--oren); color: white; }
    .btn-hapus { background: var(--merah); color: white; }
    .btn-selesai {
      background: var(--hijau);
      font-size: 18px;
      padding: 16px;
      margin-top: 10px;
    }
    .btn-qty-kecil {
      padding: 6px 12px;
      width: auto;
      font-size: 16px;
      font-weight: 700;
      display: inline-block;
      margin: 0 2px;
    }
    .btn-qty-minus { background: #f59e0b; color: white; }

    #scanInput {
      font-size: 18px;
      background: #fffbeb;
      border: 2px solid #fbbf24;
      text-transform: uppercase;
    }
    .status-scan {
      font-size: 13px;
      color: var(--oren);
      font-weight: 600;
      text-align: center;
      margin: 4px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th { background: #f1f5f9; font-weight: 600; }
    td:last-child { text-align: right; white-space: nowrap; }

    .total-box {
      background: var(--biru);
      color: white;
      padding: 16px;
      border-radius: 12px;
      margin: 16px 0;
      text-align: center;
    }
    .total-box.hijau { background: var(--hijau); }
    .total-box .label { font-size: 13px; opacity: 0.9; }
    .total-box .angka { font-size: 26px; font-weight: 800; }

    .uang-cepat {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 12px 0;
    }
    .uang-cepat button {
      background: #e2e8f0;
      color: #334550;
      padding: 10px;
      font-size: 13px;
    }

    .laba-struk {
      background: #fefce8;
      border: 1px solid #fde68a;
      color: #92400e;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      margin: 8px 0;
    }
    .laba-struk .angka-laba { font-size: 18px; color: var(--hijau); font-weight: 700; }

    .hide { display: none !important; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      width: 90%;
      max-width: 400px;
    }
    .toast {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>💰 KASIR PRO</h1>
      <small>Scan cepat • Hitung otomatis • Offline</small>
    </div>

    <div class="konten">
      <div class="grid">
        <!-- Kolom Kiri - Input -->
        <div class="card">
          <h3>1. Scan Barcode</h3>
          <input type="text" id="scanInput" placeholder="Klik lalu scan..." autofocus />
          <div id="statusScan" class="status-scan"></div>
          <button class="btn-kamera" onclick="mulaiScanKamera()">📷 Buka Kamera HP</button>
          <button onclick="stopScanKamera()" id="btnStop" class="hide btn-hapus">Tutup Kamera</button>
          <div id="reader" class="hide"></div>

          <h3 style="margin-top:20px">2. Cari Manual</h3>
          <input type="text" id="cariManual" placeholder="Ketik nama barang..." />

          <h3 style="margin-top:16px">3. Pilih dari Daftar</h3>
          <select id="pilihBarang"></select>
          <div style="display:flex; gap:10px; margin-top:6px;">
            <input type="number" id="qtyManual" value="1" min="1" style="flex:1"/>
            <button onclick="tambahManual()" style="flex:2">+ Tambah</button>
          </div>
        </div>

        <!-- Kolom Kanan - Struk -->
        <div class="card">
          <h3>Struk Belanja</h3>
          <div style="max-height: 350px; overflow-y:auto; border:1px solid #e2e8f0; border-radius:8px;">
            <table id="tabelStruk">
              <thead>
                <tr>
                  <th>Barang</th>
                  <th style="text-align:center">Qty</th>
                  <th style="text-align:right">Harga</th>
                  <th style="text-align:right">Total</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="total-box">
            <div class="label">TOTAL BAYAR</div>
            <div class="angka">Rp <span id="totalHarga">0</span></div>
          </div>

          <div class="laba-struk">
            Estimasi Laba: <span class="angka-laba">Rp <span id="labaStruk">0</span></span>
          </div>

          <div class="uang-cepat">
            <button onclick="setUang('pas')">Uang Pas</button>
            <button onclick="setUang(10000)">10rb</button>
            <button onclick="setUang(20000)">20rb</button>
            <button onclick="setUang(50000)">50rb</button>
            <button onclick="setUang(100000)">100rb</button>
            <button onclick="setUang(0)">Reset</button>
          </div>

          <input type="number" id="bayar" placeholder="Uang dari pembeli" oninput="hitungKembali()" />
          
          <div class="total-box hijau">
            <div class="label">KEMBALIAN</div>
            <div class="angka">Rp <span id="kembalian">0</span></div>
          </div>

          <button class="btn-selesai" onclick="selesaiTransaksi()">✅ SELESAI & CETAK</button>
          <button onclick="resetStruk()" style="background:#64748b">Reset Struk</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    let dbBarang = JSON.parse(localStorage.getItem("barang") || "[]");
    let struk = [];

    // Dummy data jika kosong
    if (dbBarang.length === 0) {
      dbBarang = [
        { barcode: "8992761120015", nama: "Indomie Goreng", hargaBeli: 2500, hargaJual: 3500, stok: 100 },
        { barcode: "8999909015032", nama: "Aqua 600ml", hargaBeli: 2000, hargaJual: 3000, stok: 50 },
        { barcode: "8992388111113", nama: "Teh Pucuk", hargaBeli: 3000, hargaJual: 4000, stok: 80 },
      ];
      localStorage.setItem("barang", JSON.stringify(dbBarang));
    }

    let html5QrcodeScanner = null;
    let isScanning = false;

    function beep() {
      try {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        osc.frequency.value = 1000;
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      } catch(e){}
    }

    function mulaiScanKamera() {
      stopScanKamera();
      document.getElementById("reader").classList.remove("hide");
      document.getElementById("btnStop").classList.remove("hide");
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } });
      html5QrcodeScanner.render(onScanSuccess);
    }

    function stopScanKamera() {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.clear();
        html5QrcodeScanner = null;
      }
      document.getElementById("reader").classList.add("hide");
      document.getElementById("btnStop").classList.add("hide");
    }

    function onScanSuccess(decodedText) {
      if (isScanning) return;
      isScanning = true;
      tambahKeStruk(decodedText);
      setTimeout(() => { isScanning = false; }, 800);
    }

    // Scan Input
    document.getElementById("scanInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        let kode = this.value.trim();
        if (kode) tambahKeStruk(kode);
        this.value = "";
      }
    });

    function tambahKeStruk(barcode, qty = 1) {
      let barang = dbBarang.find(b => b.barcode === barcode);
      if (!barang) return alert("Barang tidak ditemukan!");

      let existing = struk.find(s => s.barcode === barcode);
      if (existing) {
        existing.qty += qty;
      } else {
        struk.push({
          barcode: barang.barcode,
          nama: barang.nama,
          hargaBeli: barang.hargaBeli,
          hargaJual: barang.hargaJual,
          qty: qty
        });
      }
      beep();
      renderStruk();
    }

    function renderStruk() {
      let tbody = document.querySelector("#tabelStruk tbody");
      tbody.innerHTML = "";
      let totalJual = 0, totalModal = 0;

      struk.forEach((item, i) => {
        let subtotal = item.hargaJual * item.qty;
        totalJual += subtotal;
        totalModal += item.hargaBeli * item.qty;

        tbody.innerHTML += `
          <tr>
            <td>${item.nama}</td>
            <td style="text-align:center">${item.qty}</td>
            <td style="text-align:right">${item.hargaJual.toLocaleString()}</td>
            <td style="text-align:right">${subtotal.toLocaleString()}</td>
            <td>
              <button class="btn-qty-kecil btn-qty-minus" onclick="kurangiJumlah(${i})">-</button>
              <button class="btn-qty-kecil" onclick="tambahJumlah(${i})">+</button>
              <button class="btn-hapus" onclick="hapusItem(${i})" style="padding:4px 8px;font-size:12px">X</button>
            </td>
          </tr>`;
      });

      document.getElementById("totalHarga").innerText = totalJual.toLocaleString();
      document.getElementById("labaStruk").innerText = (totalJual - totalModal).toLocaleString();
      hitungKembali();
    }

    function kurangiJumlah(i) {
      if (struk[i].qty > 1) struk[i].qty--;
      else hapusItem(i);
      renderStruk();
    }
    function tambahJumlah(i) { struk[i].qty++; renderStruk(); }
    function hapusItem(i) { struk.splice(i, 1); renderStruk(); }

    function setUang(nominal) {
      let total = struk.reduce((a, b) => a + b.hargaJual * b.qty, 0);
      document.getElementById("bayar").value = nominal === "pas" ? total : nominal;
      hitungKembali();
    }

    function hitungKembali() {
      let total = struk.reduce((a, b) => a + b.hargaJual * b.qty, 0);
      let bayar = parseInt(document.getElementById("bayar").value) || 0;
      let kembali = bayar - total;
      document.getElementById("kembalian").innerText = kembali > 0 ? kembali.toLocaleString() : 0;
    }

    function tambahManual() {
      let kode = document.getElementById("pilihBarang").value;
      let qty = parseInt(document.getElementById("qtyManual").value) || 1;
      if (kode) tambahKeStruk(kode, qty);
    }

    function selesaiTransaksi() {
      if (struk.length === 0) return alert("Struk kosong");
      
      let total = struk.reduce((a, b) => a + b.hargaJual * b.qty, 0);
      let bayar = parseInt(document.getElementById("bayar").value) || 0;
      
      if (bayar < total) return alert("Uang pembeli kurang!");

      alert(`✅ Transaksi selesai!\nTotal: Rp${total.toLocaleString()}\nKembalian: Rp${(bayar - total).toLocaleString()}`);
      
      // Simpan transaksi (opsional)
      resetStruk();
    }

    function resetStruk() {
      struk = [];
      document.getElementById("bayar").value = "";
      renderStruk();
      document.getElementById("scanInput").focus();
    }

    function tampilkanToast(msg) {
      let toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = `<strong>${msg}</strong>`;
      document.getElementById("toastContainer").appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    // Render daftar barang untuk pilihan manual
    function renderPilihBarang() {
      let select = document.getElementById("pilihBarang");
      select.innerHTML = '<option value="">-- Pilih Barang --</option>';
      dbBarang.forEach(b => {
        let opt = document.createElement("option");
        opt.value = b.barcode;
        opt.textContent = `${b.nama} - Rp${b.hargaJual.toLocaleString()} (Stok: ${b.stok})`;
        select.appendChild(opt);
      });
    }

    // Init
    renderPilihBarang();
    renderStruk();
  </script>
</body>
</html>
