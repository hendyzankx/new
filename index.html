<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KasirPlus - Tambah Stok Produk</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f0f2f8;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 0;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, #1a3c5e, #0e2a44);
            padding: 20px 18px 18px 18px;
            color: white;
            border-radius: 0 0 28px 28px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        }

        .app-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-header p {
            font-size: 0.8rem;
            opacity: 0.85;
            margin-top: 6px;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-btn:active {
            transform: scale(0.96);
            background: rgba(255,255,255,0.3);
        }

        /* Container utama */
        .container {
            padding: 18px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Kartu scanner QR */
        .scanner-card {
            background: white;
            border-radius: 32px;
            padding: 18px 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
        }

        .section-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1e2f41;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #1c6e9f;
            padding-left: 12px;
        }

        .qr-reader-wrapper {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        #qr-reader {
            width: 100%;
        }

        .scan-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 12px 0 8px;
            flex-wrap: wrap;
        }

        .btn-scan {
            background: #eef2fa;
            border: none;
            padding: 10px 20px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f4973;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-scan-primary {
            background: #1c6e9f;
            color: white;
        }

        .btn-scan-primary:active, .btn-scan:active {
            transform: scale(0.96);
        }

        .scan-result {
            background: #e8f0fe;
            border-radius: 20px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 0.85rem;
            word-break: break-all;
            display: none;
        }

        /* Form Stok Produk */
        .form-stok-card {
            background: white;
            border-radius: 32px;
            padding: 18px 16px 22px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #3b4e6b;
            display: block;
            margin-bottom: 6px;
        }

        .input-group label i {
            margin-right: 5px;
            color: #1c6e9f;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 28px;
            border: 1px solid #dce3ec;
            background: #fefefe;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #1c6e9f;
            box-shadow: 0 0 0 2px rgba(28,110,159,0.2);
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-add-stok {
            background: #1f8a4c;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-add-stok:active {
            transform: scale(0.97);
            background: #146e3e;
        }

        /* List Produk (Tabel Stok) */
        .list-stok-card {
            background: white;
            border-radius: 32px;
            padding: 18px 16px;
            margin-bottom: 20px;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f0f2f8;
            border-radius: 40px;
            padding: 8px 16px;
            gap: 8px;
            flex: 1;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.85rem;
            width: 100%;
        }

        .produk-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .produk-item {
            background: #fafcff;
            border: 1px solid #eef2f8;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .produk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .produk-nama {
            font-weight: 800;
            font-size: 1rem;
            color: #1e2f41;
        }

        .produk-kode {
            font-size: 0.7rem;
            color: #7e8a9e;
            font-family: monospace;
        }

        .stok-badge {
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #2e7d32;
        }

        .produk-detail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0;
            font-size: 0.75rem;
        }

        .detail-label {
            color: #6c7e9e;
        }

        .detail-value {
            font-weight: 700;
            color: #1f4973;
        }

        .btn-hapus {
            background: none;
            border: none;
            color: #d32f2f;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
        }

        .empty-list {
            text-align: center;
            color: #aaa;
            padding: 40px;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 28, 40, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast-msg.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container { padding: 12px; }
            .produk-detail { grid-template-columns: 1fr; gap: 4px; }
            .row-2col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1><i class="fas fa-boxes"></i> Tambah Stok Produk</h1>
    <p>Scan QR code | Input harga jual, beli, modal & stok</p>
    <button id="backToMenuBtn" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali ke Menu Utama</button>
</div>

<div class="container">
    <!-- Scanner QR Card -->
    <div class="scanner-card">
        <div class="section-title">
            <i class="fas fa-qrcode"></i> Scan QR Produk
        </div>
        <div class="qr-reader-wrapper">
            <div id="qr-reader" style="width:100%;"></div>
        </div>
        <div class="scan-controls">
            <button id="start-scan-btn" class="btn-scan btn-scan-primary"><i class="fas fa-camera"></i> Mulai Kamera</button>
            <button id="stop-scan-btn" class="btn-scan"><i class="fas fa-stop"></i> Stop Kamera</button>
        </div>
        <div id="scan-result" class="scan-result">
            <div class="result-label"><i class="fas fa-barcode"></i> Hasil Scan:</div>
            <div id="qr-data-text">-</div>
        </div>
        <p style="font-size: 11px; color:#888; text-align:center; margin-top:8px;">✨ Scan QR code produk untuk mengisi otomatis kode produk</p>
    </div>

    <!-- Form Tambah/Edit Stok -->
    <div class="form-stok-card">
        <div class="section-title">
            <i class="fas fa-edit"></i> Form Stok Produk
        </div>
        <div class="input-group">
            <label><i class="fas fa-tag"></i> Kode Produk (QR)</label>
            <input type="text" id="product-code" placeholder="Scan QR atau input manual" autocomplete="off">
        </div>
        <div class="input-group">
            <label><i class="fas fa-box"></i> Nama Produk</label>
            <input type="text" id="product-name" placeholder="Contoh: Kopi Arabica Premium" autocomplete="off">
        </div>
        <div class="row-2col">
            <div class="input-group">
                <label><i class="fas fa-money-bill-wave"></i> Harga Beli (Rp)</label>
                <input type="number" id="buy-price" placeholder="Harga beli" value="0">
            </div>
            <div class="input-group">
                <label><i class="fas fa-tag"></i> Harga Jual (Rp)</label>
                <input type="number" id="sell-price" placeholder="Harga jual" value="0">
            </div>
        </div>
        <div class="row-2col">
            <div class="input-group">
                <label><i class="fas fa-chart-line"></i> Modal / Keuntungan (Auto)</label>
                <input type="text" id="profit-margin" readonly placeholder="Otomatis" style="background:#f5f5f5;">
            </div>
            <div class="input-group">
                <label><i class="fas fa-cubes"></i> Jumlah Stok</label>
                <input type="number" id="stock-qty" placeholder="Jumlah stok" value="0">
            </div>
        </div>
        <button id="saveProductBtn" class="btn-add-stok"><i class="fas fa-save"></i> Simpan / Update Stok</button>
    </div>

    <!-- List Produk (Database Stok) -->
    <div class="list-stok-card">
        <div class="list-header">
            <div class="section-title" style="margin-bottom:0;">
                <i class="fas fa-list"></i> Daftar Stok Produk
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-produk" placeholder="Cari nama atau kode...">
            </div>
        </div>
        <div id="produk-list-container" class="produk-list">
            <div class="empty-list">📦 Belum ada produk. Tambahkan stok di atas.</div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✔️ Notifikasi</div>

<script>
    // ==================== DATA PRODUK (Local Storage) ====================
    let products = [];
    let nextId = 1;

    // Load data dari localStorage
    function loadProducts() {
        const stored = localStorage.getItem('kasirplus_products');
        if(stored) {
            products = JSON.parse(stored);
            if(products.length > 0) {
                nextId = Math.max(...products.map(p => p.id)) + 1;
            }
        } else {
            // Data contoh untuk demo
            products = [
                { id: 1, code: "QR-COFFEE-001", name: "Kopi Arabica", buyPrice: 15000, sellPrice: 25000, stock: 25, createdAt: new Date().toISOString() },
                { id: 2, code: "QR-TEA-002", name: "Teh Tarik", buyPrice: 8000, sellPrice: 15000, stock: 40, createdAt: new Date().toISOString() }
            ];
            nextId = 3;
            saveProducts();
        }
        renderProductList();
    }

    function saveProducts() {
        localStorage.setItem('kasirplus_products', JSON.stringify(products));
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
        if(isError) console.warn(message);
    }

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID').format(angka);
    }

    function updateProfitMargin() {
        const buyPrice = parseInt(document.getElementById('buy-price').value) || 0;
        const sellPrice = parseInt(document.getElementById('sell-price').value) || 0;
        const profit = sellPrice - buyPrice;
        const marginField = document.getElementById('profit-margin');
        if(profit >= 0) {
            marginField.value = `+ Rp ${formatRupiah(profit)} (Untung)`;
            marginField.style.color = '#2e7d32';
        } else {
            marginField.value = `Rp ${formatRupiah(Math.abs(profit))} (Rugi)`;
            marginField.style.color = '#d32f2f';
        }
    }

    function resetForm() {
        document.getElementById('product-code').value = '';
        document.getElementById('product-name').value = '';
        document.getElementById('buy-price').value = '0';
        document.getElementById('sell-price').value = '0';
        document.getElementById('stock-qty').value = '0';
        updateProfitMargin();
    }

    function saveProduct() {
        let code = document.getElementById('product-code').value.trim();
        let name = document.getElementById('product-name').value.trim();
        let buyPrice = parseInt(document.getElementById('buy-price').value) || 0;
        let sellPrice = parseInt(document.getElementById('sell-price').value) || 0;
        let stock = parseInt(document.getElementById('stock-qty').value) || 0;

        if(!code) {
            showToast("❌ Kode produk wajib diisi (scan QR atau input manual)", true);
            return;
        }
        if(!name) {
            showToast("❌ Nama produk wajib diisi", true);
            return;
        }
        if(buyPrice < 0 || sellPrice < 0) {
            showToast("❌ Harga tidak boleh negatif", true);
            return;
        }
        if(stock < 0) stock = 0;

        const existingIndex = products.findIndex(p => p.code.toLowerCase() === code.toLowerCase());
        if(existingIndex !== -1) {
            products[existingIndex] = {
                ...products[existingIndex],
                name: name,
                buyPrice: buyPrice,
                sellPrice: sellPrice,
                stock: stock,
                updatedAt: new Date().toISOString()
            };
            showToast(`✏️ Produk "${name}" berhasil diperbarui`);
        } else {
            const newProduct = {
                id: nextId++,
                code: code,
                name: name,
                buyPrice: buyPrice,
                sellPrice: sellPrice,
                stock: stock,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            products.push(newProduct);
            showToast(`✅ Produk baru "${name}" ditambahkan!`);
        }
        saveProducts();
        renderProductList();
        resetForm();
        document.getElementById('scan-result').style.display = 'none';
    }

    function deleteProduct(id) {
        if(confirm("Yakin hapus produk ini dari daftar stok?")) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderProductList();
            showToast("🗑 Produk dihapus");
        }
    }

    function editProduct(product) {
        document.getElementById('product-code').value = product.code;
        document.getElementById('product-name').value = product.name;
        document.getElementById('buy-price').value = product.buyPrice;
        document.getElementById('sell-price').value = product.sellPrice;
        document.getElementById('stock-qty').value = product.stock;
        updateProfitMargin();
        document.querySelector('.form-stok-card').scrollIntoView({ behavior: 'smooth' });
        showToast(`✏️ Edit mode: ${product.name}`);
    }

    function quickAddStock(productId) {
        const product = products.find(p => p.id === productId);
        if(!product) return;
        let tambahan = prompt(`Tambah stok untuk "${product.name}"\nStok saat ini: ${product.stock}\nMasukkan jumlah tambahan:`, "1");
        if(tambahan !== null && !isNaN(parseInt(tambahan)) && parseInt(tambahan) > 0) {
            product.stock += parseInt(tambahan);
            saveProducts();
            renderProductList();
            showToast(`✅ Stok ${product.name} bertambah ${tambahan}. Total: ${product.stock}`);
        } else if(tambahan !== null) {
            showToast("❌ Jumlah tidak valid", true);
        }
    }

    function renderProductList() {
        const container = document.getElementById('produk-list-container');
        const searchTerm = document.getElementById('search-produk')?.value.toLowerCase() || '';
        
        let filtered = products.filter(p => 
            p.name.toLowerCase().includes(searchTerm) || 
            p.code.toLowerCase().includes(searchTerm)
        );
        
        if(filtered.length === 0) {
            container.innerHTML = `<div class="empty-list">📭 Tidak ada produk ditemukan</div>`;
            return;
        }
        
        let html = '';
        filtered.forEach(prod => {
            const profit = prod.sellPrice - prod.buyPrice;
            const profitClass = profit >= 0 ? '#2e7d32' : '#d32f2f';
            const profitText = profit >= 0 ? `+${formatRupiah(profit)}` : `${formatRupiah(profit)}`;
            html += `
                <div class="produk-item" data-id="${prod.id}">
                    <div class="produk-header">
                        <div>
                            <div class="produk-nama">${escapeHtml(prod.name)}</div>
                            <div class="produk-kode"><i class="fas fa-qrcode"></i> ${escapeHtml(prod.code)}</div>
                        </div>
                        <div style="display:flex; gap:6px; align-items:center;">
                            <span class="stok-badge"><i class="fas fa-cubes"></i> Stok: ${prod.stock}</span>
                            <button class="btn-hapus" onclick="deleteProduct(${prod.id})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <div class="produk-detail">
                        <div><span class="detail-label">Harga Beli</span><br><span class="detail-value">Rp ${formatRupiah(prod.buyPrice)}</span></div>
                        <div><span class="detail-label">Harga Jual</span><br><span class="detail-value">Rp ${formatRupiah(prod.sellPrice)}</span></div>
                        <div><span class="detail-label">Margin/Unit</span><br><span class="detail-value" style="color:${profitClass};">${profitText}</span></div>
                    </div>
                    <div style="margin-top:8px;">
                        <button onclick="editProduct(${JSON.stringify(prod).replace(/"/g, '&quot;')})" style="background:#eef2fa; border:none; border-radius:30px; padding:6px 14px; font-size:0.7rem; font-weight:600; color:#1f4973;"><i class="fas fa-pen"></i> Edit Stok</button>
                        <button onclick="quickAddStock(${prod.id})" style="background:#e8f0fe; border:none; border-radius:30px; padding:6px 14px; font-size:0.7rem; font-weight:600; color:#1c6e9f; margin-left:6px;"><i class="fas fa-plus-circle"></i> Tambah Stok</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== QR SCANNER ====================
    let html5QrCode = null;
    let isScanning = false;
    
    const startScanBtn = document.getElementById('start-scan-btn');
    const stopScanBtn = document.getElementById('stop-scan-btn');
    const scanResultDiv = document.getElementById('scan-result');
    const qrDataTextSpan = document.getElementById('qr-data-text');
    
    function startQrScanner() {
        if(isScanning) { showToast("Scanner sudah aktif"); return; }
        html5QrCode = new Html5Qrcode("qr-reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config,
            (decodedText) => {
                const codeInput = document.getElementById('product-code');
                codeInput.value = decodedText;
                qrDataTextSpan.innerText = decodedText;
                scanResultDiv.style.display = "block";
                showToast(`📷 Scan berhasil: ${decodedText.substring(0,30)}`);
                
                const existing = products.find(p => p.code.toLowerCase() === decodedText.toLowerCase());
                if(existing) {
                    document.getElementById('product-name').value = existing.name;
                    document.getElementById('buy-price').value = existing.buyPrice;
                    document.getElementById('sell-price').value = existing.sellPrice;
                    document.getElementById('stock-qty').value = existing.stock;
                    updateProfitMargin();
                    showToast(`📦 Produk ditemukan: ${existing.name}, silahkan update stok / harga`);
                } else {
                    document.getElementById('product-name').focus();
                    showToast(`🆕 Kode baru, silakan isi nama & harga`);
                }
            },
            (errorMsg) => { }
        ).then(() => {
            isScanning = true;
            startScanBtn.disabled = true;
            stopScanBtn.disabled = false;
            showToast("📸 Kamera aktif, scan QR code produk");
        }).catch(err => {
            console.error(err);
            showToast("❌ Gagal akses kamera. Pastikan izin diberikan.", true);
            startScanBtn.disabled = false;
            stopScanBtn.disabled = true;
        });
    }
    
    function stopQrScanner() {
        if(html5QrCode && isScanning) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                startScanBtn.disabled = false;
                stopScanBtn.disabled = true;
                showToast("⏹️ Kamera dimatikan");
            }).catch(e=>console.warn);
        } else {
            startScanBtn.disabled = false;
            stopScanBtn.disabled = true;
        }
    }
    
    // Event listeners
    startScanBtn.addEventListener('click', startQrScanner);
    stopScanBtn.addEventListener('click', stopQrScanner);
    
    document.getElementById('saveProductBtn').addEventListener('click', saveProduct);
    document.getElementById('buy-price').addEventListener('input', updateProfitMargin);
    document.getElementById('sell-price').addEventListener('input', updateProfitMargin);
    document.getElementById('search-produk').addEventListener('input', () => renderProductList());
    
    const backBtn = document.getElementById('backToMenuBtn');
    if(backBtn) {
        backBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    }
    
    // inisialisasi
    loadProducts();
    updateProfitMargin();
    
    window.addEventListener("beforeunload", () => {
        if(html5QrCode && isScanning) html5QrCode.stop().catch(e=>{});
    });
    
    // Ekspor fungsi global untuk onclick
    window.deleteProduct = deleteProduct;
    window.editProduct = editProduct;
